# Few-shot examples for per-role intro rewrites. The intro is a single
# paragraph that frames a role; rewrites tilt the framing toward the JD
# without inventing scope.

- original: >-
    Led platform team of 6 engineers at Acme, building internal
    developer tools.
  direction: >-
    JD focus: event-driven microservices. Emphasize platform leadership
    in a backend distributed-systems context.
  rewritten: >-
    Led an Acme platform team of 6 engineers building internal
    developer tools for backend distributed services, including
    event-driven microservices.

- original: >-
    Worked on the firmware UI for Pebble smartwatches.
  direction: >-
    JD focus: low-latency embedded systems. Emphasize embedded
    constraints and real-time behavior.
  rewritten: >-
    Worked on the firmware UI for Pebble smartwatches, delivering
    low-latency user-facing features under tight embedded-system
    constraints.
